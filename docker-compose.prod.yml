services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-meeting_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-meeting_pass}
      POSTGRES_DB: ${POSTGRES_DB:-meeting_ai}
    volumes:
      - meeting_ai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meeting_user} -d ${POSTGRES_DB:-meeting_ai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - meeting_ai_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        alembic upgrade head && \
        uvicorn backend.app.main:app --host 0.0.0.0 --port 8010
    ports:
      - "8010:8010"
    volumes:
      - uploads_data:/app/backend/uploads

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - backend.app.worker.celery_app.celery_app
      - worker
      - --loglevel=info
    volumes:
      - uploads_data:/app/backend/uploads

volumes:
  meeting_ai_pgdata:
  meeting_ai_redisdata:
  uploads_data:
