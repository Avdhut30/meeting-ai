services:
  db:
    image: postgres:16
    container_name: meeting_ai_db
    environment:
      POSTGRES_USER: meeting_user
      POSTGRES_PASSWORD: meeting_pass
      POSTGRES_DB: meeting_ai
    ports:
      - "5432:5432"
    volumes:
      - meeting_ai_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: meeting_ai_redis
    ports:
      - "6379:6379"
    volumes:
      - meeting_ai_redisdata:/data

volumes:
  meeting_ai_pgdata:
  meeting_ai_redisdata:
